contents:
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  repositories:
    - https://packages.wolfi.dev/os
    - "@local /packages"
  packages:
    - smartctl-exporter@local
    - smartmontools
    - ca-certificates-bundle

entrypoint:
  command: /usr/bin/smartctl_exporter

environment:
  PATH: /usr/local/sbin:/usr/local/bin:/usr/bin:/usr/sbin:/sbin:/bin

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: 65532

annotations:
  io.prometheus.image.variant: a8e
  org.opencontainers.image.source: https://github.com/vexxhost/smartctl_exporter

archs:
  - amd64
