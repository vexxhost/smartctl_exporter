name: image

on:
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: Image and Git tag to publish, for example v0.14.0
        required: true
        type: string

env:
  DEPOT_PROJECT_ID: p3t28cts5g
  DOCKER_REPO: packages.vexxhost.com
  DOCKER_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'ci' }}

jobs:
  build:
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate image tag
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if ! printf '%s\n' "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Image tag must look like v0.14.0 or v0.14.0-rc.1" >&2
            exit 1
          fi

      - name: Build and save image
        id: build
        uses: depot/build-push-action@98e78adca7817480b8185f474a400b451d74e287 # v1.18.0
        with:
          project: ${{ env.DEPOT_PROJECT_ID }}
          context: .
          file: Dockerfile.a8e
          platforms: linux/amd64
          build-args: |
            VERSION=${{ env.DOCKER_IMAGE_TAG }}
            REVISION=${{ github.sha }}
            BRANCH=${{ github.ref_name }}
          tags: ${{ env.DOCKER_REPO }}/smartctl-exporter-linux-amd64:${{ env.DOCKER_IMAGE_TAG }}
          save: true

      - name: Pull image
        uses: depot/pull-action@a913e06772c98ecd2361a8cc49bec81592dc6600 # v1.3.1
        with:
          build-id: ${{ steps.build.outputs.build-id }}
          platform: linux/amd64
          tags: ${{ env.DOCKER_REPO }}/smartctl-exporter-linux-amd64:${{ env.DOCKER_IMAGE_TAG }}

      - name: Verify image
        run: |
          image="${DOCKER_REPO}/smartctl-exporter-linux-amd64:${DOCKER_IMAGE_TAG}"
          docker run --rm "${image}" --version
          docker run --rm --entrypoint smartctl "${image}" --version
          docker image inspect --format='Image size: {{.Size}} bytes' "${image}"

      - uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.72.0
          cache: true

      - name: Scan image
        run: |
          trivy image \
            --exit-code 1 \
            --ignore-unfixed \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL \
            "${DOCKER_REPO}/smartctl-exporter-linux-amd64:${DOCKER_IMAGE_TAG}"

      - name: Log in to Pulp
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: packages.vexxhost.com
          username: ${{ secrets.PULP_CONTAINER_USERNAME }}
          password: ${{ secrets.PULP_CONTAINER_PASSWORD }}

      - name: Publish image
        if: github.event_name == 'workflow_dispatch'
        run: |
          make docker-publish
          make docker-manifest
