name: image

on:
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: Image and Git tag to publish, for example v0.14.0
        required: true
        type: string

env:
  DEPOT_PROJECT_ID: p3t28cts5g
  IMAGE: packages.vexxhost.com/smartctl-exporter
  CANDIDATE_IMAGE: local/smartctl-exporter-linux-amd64:ci

jobs:
  build:
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate image tag
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if ! printf '%s\n' "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Image tag must look like v0.14.0 or v0.14.0-rc.1" >&2
            exit 1
          fi

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1

      - name: Configure Docker to use Depot
        run: depot configure-docker

      - name: Build image
        run: |
          make image \
            DOCKER_REPO=local \
            DOCKER_IMAGE_TAG=ci

      - uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.72.0
          cache: true

      - name: Scan image
        run: |
          trivy image \
            --exit-code 1 \
            --ignore-unfixed \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL \
            "${CANDIDATE_IMAGE}"

      - name: Log in to Pulp
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: packages.vexxhost.com
          username: ${{ secrets.PULP_CONTAINER_USERNAME }}
          password: ${{ secrets.PULP_CONTAINER_PASSWORD }}

      - name: Publish image
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          docker tag "${CANDIDATE_IMAGE}" "${IMAGE}:${RELEASE_TAG}"
          docker push "${IMAGE}:${RELEASE_TAG}"
